<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: white;
        }

        .contact-title {
            font-weight: 800;
            color: black;
        }

        .custom-btn {
            background-color: orange !important;
            color: white !important;
            font-weight: 600;
            padding: 8px 30px;
            border: none;
            transition: all 0.3s ease;
        }

        .custom-btn:hover {
            background-color: orange;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container mt-5 pt-5">
        <div class="row">
            <div class="col-md-10 col-lg-8 mx-auto">

                <h1 class="contact-title mb-3">Contacto</h1>
                <p class="text-muted mb-4">
                    Contacta con nosotros si tienes alguna duda, quieres ofrecernos o buscar un inmbueble o si quieres
                    trabajar con nosotros.
                </p>

                <div class="bg-white p-4 p-md-5 rounded-4 shadow-sm border text-start">
                    <form>
                        <div class="row mb-4 align-items-center">
                            <label for="emailInput" class="col-sm-3 col-form-label fw-bold text-sm-end">Tu
                                E-mail</label>
                            <div class="col-sm-9">
                                <input type="email" class="form-control text-muted" id="emailInput"
                                    placeholder="E-mail">
                            </div>
                        </div>

                        <div class="row mb-4">
                            <label for="messageInput" class="col-sm-3 col-form-label fw-bold text-sm-end">Tu
                                mensaje</label>
                            <div class="col-sm-9">
                                <textarea class="form-control text-muted" id="messageInput" rows="5"
                                    placeholder="Por favor, escriba su mensaje aquí..."></textarea>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end">
                            <button type="submit" class="btn custom-btn rounded-pill">Enviar</button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
